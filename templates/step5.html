{% extends "base.html" %}
{% block content %}

<div class="card download-card">
  <div class="card-header">
    <div class="success-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="30" fill="#E8F5E9" stroke="#00875A" stroke-width="2"/>
        <path d="M20 32l9 9 15-16" stroke="#00875A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2 class="card-title">Your ZIP is ready!</h2>
    <p class="card-subtitle">All changes have been applied. Download your updated archive below.</p>
  </div>

  <div class="download-area">
    <div class="download-filename">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="5" fill="#FFF3F2"/><path d="M7 8.5h14M7 14h9M7 19.5h11" stroke="#DA291C" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>{{ output_name }}</span>
    </div>
    <a href="/download" class="btn btn-primary btn-lg">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v9M5 8l4 4 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 15h12" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      Download {{ output_name }}
    </a>
  </div>

  <div class="start-over-area">
    <a href="/reset" class="btn btn-ghost">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 1 1 1.5 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M2 12V8h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Start over with a new ZIP
    </a>
  </div>
</div>

{% endblock %}
